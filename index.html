<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #1a2a3a;
            color: #e0eafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2c3e50;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        #admin-panel { display: none; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
        }
        input { background-color: #34495e; color: white; }
        button {
            background-color: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login-section" class="container">
        <h2>Admin Access</h2>
        <input type="password" id="admin-password" placeholder="비밀번호를 입력하세요">
        <button onclick="checkPassword()">접속하기</button>
        <p id="login-msg" style="color: #e74c3c;"></p>
    </div>
    <div id="admin-panel" class="container">
        <h2>관리자 페이지</h2>
        <p>로그인에 성공했습니다. 다음 지시를 기다립니다.</p>
    </div>
    <script>
      const SECRET_CODE = "4037";
const SB_URL = "https://zkkhzsgaryoraytvsqbf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpra2h6c2dhcnlvcmF5dHZzcWJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc5ODM5OTcsImV4cCI6MjA1MzU1OTk5N30.UJtqcka35dVssnZRuUk6zukfjF9UNX392Shd841GSQk"; 

const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

function checkPassword() {
    const input = document.getElementById('admin-password').value;
    if (input === SECRET_CODE) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadMacSendingData();
    } else {
        document.getElementById('login-msg').innerText = "비밀번호가 일치하지 않습니다.";
    }
}

async function loadMacSendingData() {
    const { data, error } = await supabaseClient
        .from('MacSending')
        .select('*');

    if (error) {
        alert('데이터를 가져오지 못했습니다: ' + error.message);
        return;
    }

    const panel = document.getElementById('admin-panel');
    panel.innerHTML = `<h2>관리자 페이지</h2><p>현재 ${data.length}명의 요청이 있습니다.</p>`;
}
    </script>
</body>
</html>
