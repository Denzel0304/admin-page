<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #1a2a3a;
            color: #e0eafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2c3e50;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        #admin-panel { display: none; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
        }
        input { background-color: #34495e; color: white; }
        button {
            background-color: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login-section" class="container">
        <h2>Admin Access</h2>
        <input type="password" id="admin-password" placeholder="비밀번호를 입력하세요">
        <button onclick="checkPassword()">접속하기</button>
        <p id="login-msg" style="color: #e74c3c;"></p>
    </div>
    <div id="admin-panel" class="container">
        <h2>관리자 페이지</h2>
        <p>로그인에 성공했습니다. 다음 지시를 기다립니다.</p>
    </div>
    <script>
        const SECRET_CODE = "4037";
        function checkPassword() {
            const input = document.getElementById('admin-password').value;
            if (input === SECRET_CODE) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                document.getElementById('login-msg').innerText = "비밀번호가 일치하지 않습니다.";
            }
        }
    </script>
</body>
</html>
